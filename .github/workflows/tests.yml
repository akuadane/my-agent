name: Tests

on:
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          locked: true

      - name: Lint
        run: pixi run lint

      - name: Run tests
        # Skip integration tests, which require a running Ollama instance
        run: pixi run pytest -m "not integration"
